name: Fuzz Testing

on:
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: 'Fuzz test duration (e.g., 30s, 5m, 1h)'
        required: false
        default: '5m'

permissions:
  contents: read

jobs:
  fuzz-test:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod download

      - name: Run custom duration fuzz tests (Manual)
        run: |
          FUZZ_TIME="${{ inputs.fuzz_time || '5m' }}"
          echo "Running fuzz tests for ${FUZZ_TIME}"
          go test -run=^$ -fuzz=^FuzzDeactivate$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzDeactivateURL$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzDeactivatePassword$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzDeactivateFlagCombinations$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzActivate$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzActivateURL$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzActivateProfile$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzActivatePassword$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzActivateFlagCombinations$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzVersion$ -fuzztime=${FUZZ_TIME} ./internal/cli
          go test -run=^$ -fuzz=^FuzzVersionFlagCombinations$ -fuzztime=${FUZZ_TIME} ./internal/cli

      - name: Upload fuzz failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: fuzz-failures-go-${{ matrix.go-version }}
          path: |
            **/testdata/fuzz/*/
            !**/.git/
          retention-days: 30

      - name: Check for new crash inputs
        if: failure()
        run: |
          echo "::error::Fuzz testing found crashes. Review the uploaded artifacts."
          find . -path "*/testdata/fuzz/*/crash-*" -o -path "*/testdata/fuzz/*/leak-*" | while read crash; do
            echo "::error file=${crash}::Crash or leak detected: ${crash}"
          done

  fuzz-regression:
    name: Fuzz Regression Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod download

      - name: Run fuzz tests with existing corpus
        run: |
          # Run fuzz tests against the seed corpus without generating new inputs
          # This ensures previously found issues don't regress
          go test ./internal/cli -run=^$ -fuzz=^FuzzDeactivate$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzDeactivateURL$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzDeactivatePassword$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzDeactivateFlagCombinations$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzActivate$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzActivateURL$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzActivateProfile$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzActivatePassword$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzActivateFlagCombinations$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzVersion$ -fuzztime=1x
          go test ./internal/cli -run=^$ -fuzz=^FuzzVersionFlagCombinations$ -fuzztime=1x

      - name: Report regression test results
        if: failure()
        run: |
          echo "::error::Regression detected in fuzz testing. A previously passing input now fails."
