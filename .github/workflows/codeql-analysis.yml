name: "CodeQL"

on:
  workflow_dispatch:  
  release:
    types:
      - created
  push:
    branches: [main, release, 2.x.x]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main, release, 2.x.x]
  schedule:
    - cron: '39 3 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python' ]
        # Learn more:
        # https://docs.github.com/en/free-pro-team@latest/github/finding-security-vulnerabilities-and-errors-in-your-code/configuring-code-scanning#changing-the-languages-that-are-analyzed

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3.29.5
      with:
        languages: ${{ matrix.language }}

    - run: |
        make build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.29.5
    - name: Generate Security Report
      uses: rsdmike/github-security-report-action@a149b24539044c92786ec39af8ba38c93496495d # v3.0.4
      continue-on-error: true
      with:
        template: report
        token: ${{ secrets.SECURITY_TOKEN }}
    - name: Rename Report
      shell: bash
      continue-on-error: true
      run: |
        DATE=$(date +"%Y-%m-%d")
        mv "report.pdf" "rpc-go-security-report-$DATE.pdf"
    - name: GitHub Upload Release Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      continue-on-error: true
      with:
        name: report
        path: ./*.pdf